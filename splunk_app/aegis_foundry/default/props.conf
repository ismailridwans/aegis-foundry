# Aegis Foundry - sourcetype definitions.
#
# aegis:flight_recorder - the agent audit trail. The Python runtime appends
# one JSON object per agent action to runs/<run_id>/flight_recorder.jsonl;
# timestamps are ISO-8601 UTC with microseconds (e.g.
# "2026-06-11T09:30:01.123456+00:00") in the "ts" field. Ingested via a file
# monitor or HEC (see README.txt).
#
# aegis:triage_note - JSON notes written back by the aegis_triage custom
# alert action through the receivers/simple REST endpoint.

[aegis:flight_recorder]
INDEXED_EXTRACTIONS = json
KV_MODE = none
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = "ts":\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
MAX_TIMESTAMP_LOOKAHEAD = 40
TRUNCATE = 65536
category = Structured
description = Aegis Foundry agent flight recorder (JSON lines; one event per audited agent action)
pulldown_type = 1

[aegis:triage_note]
KV_MODE = json
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_PREFIX = "ts":\s*"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%:z
MAX_TIMESTAMP_LOOKAHEAD = 40
TRUNCATE = 65536
category = Structured
description = AI/heuristic triage notes produced by the aegis_triage custom alert action
pulldown_type = 1
