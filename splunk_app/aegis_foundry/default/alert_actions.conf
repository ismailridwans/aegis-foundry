# Aegis Foundry - custom alert action.
#
# Attach "Aegis: AI Triage Note" to any detection (including the ones the
# Deployment agent forges into this app at runtime). On trigger, splunkd runs
# bin/aegis_triage_alert.py with --execute and a JSON payload on stdin; the
# script composes a triage note (Foundation-Sec via an env-configured
# OpenAI-compatible endpoint when available, deterministic heuristic
# otherwise) and indexes it into aegis_audit as sourcetype aegis:triage_note
# through the REST receivers/simple endpoint using the payload session key.

[aegis_triage]
is_custom = 1
label = Aegis: AI Triage Note
description = Composes an AI-assisted (or deterministic heuristic) triage note for the triggered alert and writes it back to the aegis_audit index as sourcetype aegis:triage_note.
payload_format = json
alert.execute.cmd = aegis_triage_alert.py
python.version = python3
disabled = 0
