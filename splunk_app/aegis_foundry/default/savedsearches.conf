# Aegis Foundry - saved searches.
#
# IMPORTANT: this app's namespace is also the DEPLOYMENT TARGET for the Aegis
# agent runtime. When the Governor approves a detection, the Deployment agent
# calls the Splunk management REST API
# (servicesNS/nobody/aegis_foundry/saved/searches) and the new detection
# appears as a saved-search stanza in this app's local/savedsearches.conf at
# runtime. Nothing in default/ is mutated; default/ ships only the two
# operational searches below. Each deployment returns a rollback token so the
# Verification agent can delete the stanza again via the same endpoint.
#
# Audit event shape referenced by the SPL below (sourcetype
# aegis:flight_recorder, one JSON object per line):
#   {"ts": ISO8601, "agent": str, "action": str, "detail": {...},
#    "run_id": str, "seq": int}
# Relevant actions/detail keys:
#   action="gap_identified"     detail.technique_id, detail.technique_name, detail.tactic
#   action="technique_covered"  detail.technique_id, detail.technique_name, detail.tactic
#   action="rule_deployed"      detail.rule_id, detail.saved_search_name, detail.mode
#   action="noise_forecast"     detail.rule_id, detail.predicted_weekly_alerts
#   action="verification"       detail.rule_id, detail.observed_weekly_alerts

[Aegis - Flight Recorder Ingest Check]
description = Hourly health check that agent flight-recorder events are reaching the aegis_audit index. Enable once HEC or the file monitor described in README.txt is wired up; zero results for a full hour while the swarm is running means the audit pipe is broken.
search = index=aegis_audit sourcetype="aegis:flight_recorder" | stats count by agent, action
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
disabled = 1

[Aegis - Coverage Snapshot]
description = Current MITRE ATT&CK coverage posture derived from the agent audit trail: one row per technique with status GAP (gap identified, nothing deployed), COVERED (existing detection found by the Coverage Cartographer), or FORGED BY AEGIS (detection authored and deployed by the swarm).
search = index=aegis_audit sourcetype="aegis:flight_recorder" (action="gap_identified" OR action="technique_covered" OR action="rule_deployed") \
| eval technique_id=coalesce('detail.technique_id', 'detail.technique') \
| stats values(action) as actions latest(detail.technique_name) as technique_name latest(detail.tactic) as tactic by technique_id \
| eval status=case(isnotnull(mvfind(actions, "rule_deployed")), "FORGED BY AEGIS", isnotnull(mvfind(actions, "technique_covered")), "COVERED", true(), "GAP") \
| table technique_id, technique_name, tactic, status \
| sort technique_id
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
