# Aegis Foundry - index definitions.
#
# aegis_audit holds the agent "flight recorder": one JSON event per agent
# action (sourcetype aegis:flight_recorder) plus AI triage notes written by
# the aegis_triage custom alert action (sourcetype aegis:triage_note).
# Paths use the $SPLUNK_DB macro so the app never hard-codes a filesystem
# location (AppInspect best practice).

[aegis_audit]
homePath = $SPLUNK_DB/aegis_audit/db
coldPath = $SPLUNK_DB/aegis_audit/colddb
thawedPath = $SPLUNK_DB/aegis_audit/thaweddb
# Audit trails are small JSON events; keep a year, cap the bucket footprint.
frozenTimePeriodInSecs = 31536000
maxTotalDataSizeMB = 1024
