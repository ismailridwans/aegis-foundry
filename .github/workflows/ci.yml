# Aegis Foundry CI - tests + offline golden-path demo, Splunk AppInspect
# pre-certification of the packaged app, and ruff lint.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  # Unit tests plus the full deterministic mock pipeline (the exact command
  # judges run). The demo must exit 0 with zero credentials configured.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run unit tests
        run: pytest
      - name: Offline golden path (mock pipeline, zero credentials)
        # The step fails the job unless the pipeline exits 0 and prints its
        # DONE success marker.
        run: |
          python demo/run_pipeline.py --auto-approve | tee pipeline_output.txt
          grep -q "DONE" pipeline_output.txt

  # Package the Splunk app and run AppInspect pre-certification.
  # Warnings are allowed; any "failure" result fails the job.
  appinspect:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install AppInspect and package the app
        run: |
          python -m pip install --upgrade pip
          pip install splunk-appinspect
          pip install -e .
          python scripts/package_app.py
      - name: Run AppInspect (precert mode)
        run: >
          splunk-appinspect inspect dist/aegis_foundry.spl
          --mode precert
          --output-file appinspect_report.json
      - name: Fail on AppInspect failures (warnings allowed)
        run: >
          python -c "import json, sys;
          report = json.load(open('appinspect_report.json', encoding='utf-8'));
          summary = report.get('summary', {});
          failures = int(summary.get('failure', 0)) + int(summary.get('error', 0));
          print('AppInspect summary:', summary);
          sys.exit(1 if failures else 0)"
      - name: Upload AppInspect report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appinspect-report
          path: appinspect_report.json

  # Static lint with ruff (config in ruff.toml).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check aegis_foundry tests --output-format github
